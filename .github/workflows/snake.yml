name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: kajalkamble0713-jpg
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00f2fe&color_dots=161b22,1b2a41,1d4e6b,0f8b9c,00c9d6
            dist/github-contribution-grid-snake-dark.svg?color_snake=00f2fe&color_dots=0d1117,1b2a41,1d4e6b,0f8b9c,00f2fe

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
